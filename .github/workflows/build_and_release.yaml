name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download font
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.FONT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sstrahl/constantia-assets/contents/constantia_fonts.zip \
            | jq -r .content | base64 -d > fonts.zip

          unzip fonts.zip
          mkdir -p ~/.local/share/fonts/constantia
          cp constantia_ci/*.ttf ~/.local/share/fonts/constantia/
          fc-cache -fv
          fc-list | grep -i constantia

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" 

      - name: Install Python dependencies
        run: |
          pip install jupyter nbconvert[webpdf]
          playwright install chromium

      - name: Build HTML and PDF notebooks
        run: python tools/run_and_export_notebooks.py --no-clean --no-run   

      - name: Create merged PDF using LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: PCPT_all.tex
          working_directory: tools/pdf_booklet
          latexmk_use_xelatex: true
          post_compile: "pdfjam --papersize '{17cm,24cm}' PCPT_all.pdf -o PCPT_all_17-24.pdf"

      - name: Create zip file          
        run: |
          cp tools/pdf_booklet/PCPT_all_17-24.pdf ./PCPT_all.pdf
          ZIP_NAME="PCPT_${{ steps.get_version.outputs.version }}.zip"
          zip "$ZIP_NAME" -@ < <(git ls-files; ls *.html; ls *.pdf)

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: PCPT_${{ steps.get_version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
